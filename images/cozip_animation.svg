<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How cozip reads work">
  <defs>
    <marker id="ah-gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b58a00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="ah-magenta" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#492AE8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="ah-magenta-sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#492AE8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .lbl {
      font-size: 14px;
      font-weight: 700;
      font-family: "League Spartan", system-ui, sans-serif;
    }

    .sub {
      font-size: 12px;
      font-weight: 600;
      font-family: "League Spartan", system-ui, sans-serif;
    }

    .byt {
      font-size: 13px;
      font-weight: 700;
      fill: #676762;
      font-family: "League Spartan", system-ui, sans-serif;
    }

    .anim {
      opacity: 1;
    }

    @media (prefers-reduced-motion: no-preference) {
      .anim {
        opacity: 0;
        animation-duration: 7.5s;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
      }

      .step-index {
        animation-name: stepIndex;
      }

      .step-metadata {
        animation-name: stepMetadata;
      }

      .fan-0 { animation-name: fan0; }
      .fan-1 { animation-name: fan1; }
      .fan-2 { animation-name: fan2; }
      .fan-3 { animation-name: fan3; }
      .fan-4 { animation-name: fan4; }
      .fan-5 { animation-name: fan5; }
      .fan-6 { animation-name: fan6; }
      .fan-7 { animation-name: fan7; }
    }

    @keyframes stepIndex {
      0%, 4% { opacity: 0; transform: translateX(-8px); }
      8%, 24% { opacity: 1; transform: translateX(0); }
      30%, 100% { opacity: 0; transform: translateX(0); }
    }

    @keyframes stepMetadata {
      0%, 28% { opacity: 0; transform: translateX(-8px); }
      34%, 50% { opacity: 1; transform: translateX(0); }
      56%, 100% { opacity: 0; transform: translateX(0); }
    }

    @keyframes fan0 {
      0%, 54% { opacity: 0; }
      59%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes fan1 {
      0%, 56% { opacity: 0; }
      61%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes fan2 {
      0%, 58% { opacity: 0; }
      63%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes fan3 {
      0%, 60% { opacity: 0; }
      65%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes fan4 {
      0%, 62% { opacity: 0; }
      67%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes fan5 {
      0%, 64% { opacity: 0; }
      69%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes fan6 {
      0%, 66% { opacity: 0; }
      71%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes fan7 {
      0%, 68% { opacity: 0; }
      73%, 84% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }
  </style>

  <!-- Archive container -->
  <rect x="270" y="65" width="140" height="525" rx="10" fill="#ffffff" stroke="#d6d0c3" stroke-width="1.5"/>

  <!-- cozip index -->
  <rect x="275" y="70" width="130" height="55" rx="6" fill="#fff0a5" stroke="#f7cc0b" stroke-width="1.5"/>
  <text class="lbl" x="340" y="94" text-anchor="middle" fill="#7a5c00">cozip index</text>
  <text class="sub" x="340" y="111" text-anchor="middle" fill="#8a6f00">~2 KiB</text>

  <!-- DATA -->
  <rect x="275" y="130" width="130" height="345" fill="#f4f2ea" stroke="#d6d0c3" stroke-width="1"/>
  <text class="lbl" x="340" y="298" text-anchor="middle" fill="#353532">DATA</text>
  <text class="sub" x="340" y="315" text-anchor="middle" fill="#676762">3M files</text>

  <!-- Metadata / manifest -->
  <rect x="275" y="480" width="130" height="55" rx="6" fill="#e8e3ff" stroke="#492ae8" stroke-width="1.5"/>
  <text class="lbl" x="340" y="504" text-anchor="middle" fill="#2f1c95">__metadata__</text>
  <text class="sub" x="340" y="520" text-anchor="middle" fill="#492ae8">Parquet manifest</text>

  <!-- Central Directory -->
  <rect x="275" y="540" width="130" height="45" rx="6" fill="none" stroke="#a8a69d" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="lbl" x="340" y="560" text-anchor="middle" fill="#8b8b83">Central Directory</text>
  <text class="sub" x="340" y="576" text-anchor="middle" fill="#a0a0a0">(ignored)</text>

  <!-- Byte markers -->
  <text class="byt" x="420" y="78" text-anchor="start">0</text>
  <text class="byt" x="420" y="592" text-anchor="start">EOF</text>

  <!-- Step 1: cozip index -->
  <g class="anim step-index">
    <line x1="190" y1="97" x2="269" y2="97" stroke="#f7cc0b" stroke-width="3" marker-end="url(#ah-gold)"/>
    <text class="lbl" x="180" y="93" text-anchor="end" fill="#7a5c00">1. cozip index</text>
    <text class="sub" x="180" y="110" text-anchor="end" fill="#8a6f00">first tiny read</text>
  </g>

  <!-- Step 2: metadata -->
  <g class="anim step-metadata">
    <line x1="190" y1="507" x2="269" y2="507" stroke="#492ae8" stroke-width="3" marker-end="url(#ah-magenta)"/>
    <text class="lbl" x="180" y="503" text-anchor="end" fill="#2f1c95">2. metadata</text>
    <text class="sub" x="180" y="520" text-anchor="end" fill="#492ae8">manifest read</text>
  </g>

  <!-- Step 3: fan-out reads into DATA -->
  <g class="anim fan-0">
    <line x1="340" y1="479" x2="295" y2="165" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <g class="anim fan-1">
    <line x1="340" y1="479" x2="385" y2="195" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <g class="anim fan-2">
    <line x1="340" y1="479" x2="308" y2="235" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <g class="anim fan-3">
    <line x1="340" y1="479" x2="378" y2="270" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <g class="anim fan-4">
    <line x1="340" y1="479" x2="298" y2="335" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <g class="anim fan-5">
    <line x1="340" y1="479" x2="372" y2="375" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <g class="anim fan-6">
    <line x1="340" y1="479" x2="313" y2="410" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <g class="anim fan-7">
    <line x1="340" y1="479" x2="382" y2="445" stroke="#492AE8" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ah-magenta-sm)"/>
  </g>

  <!-- Fan-out label -->
  <g class="anim fan-4">
    <text class="lbl" x="512" y="333" text-anchor="start" fill="#2f1c95">3. targeted reads</text>
    <text class="sub" x="512" y="350" text-anchor="start" fill="#492ae8">only needed files</text>
  </g>
</svg>